<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2=".15" y2="1">
      <stop offset="0%" stop-color="#1F3375"/>
      <stop offset="50%" stop-color="#1B2B65"/>
      <stop offset="100%" stop-color="#142050"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2068E0"/>
      <stop offset="40%" stop-color="#2D7FF9"/>
      <stop offset="100%" stop-color="#5AB0FF"/>
    </linearGradient>
    <linearGradient id="trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#2D7FF9"/>
    </linearGradient>
    <linearGradient id="star-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#2D7FF9"/>
    </linearGradient>
    <filter id="trend-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="star-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Outer shell: rectangular chat-window C with gradient -->
  <path d="M 152,28 L 70,28 Q 26,28 26,72 L 26,168 Q 26,212 70,212 L 152,212"
        fill="none" stroke="url(#shell)" stroke-width="19"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner depth stroke -->
  <path d="M 150,42 L 74,42 Q 42,42 42,76 L 42,164 Q 42,198 74,198 L 150,198"
        fill="none" stroke="#2A3F8F" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>

  <!-- Outer edge highlight (top-left catch light) -->
  <path d="M 140,28 L 70,28 Q 26,28 26,72 L 26,100"
        fill="none" stroke="#3A5099" stroke-width="1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- Chat tail -->
  <path d="M 54,212 L 36,238 L 80,212" fill="url(#shell)"/>
  <path d="M 58,212 L 48,228 L 76,212" fill="#2A3F8F" opacity="0.12"/>

  <!-- Bar 1 (shortest) -->
  <rect x="58" y="154" width="23" height="38" rx="5.5" fill="url(#bar)"/>
  <rect x="58" y="154" width="5"  height="38" rx="2.5" fill="#5AB0FF" opacity="0.28"/>
  <rect x="76" y="154" width="2"  height="38" rx="1"   fill="#1B2B65" opacity="0.08"/>

  <!-- Bar 2 (medium) -->
  <rect x="89" y="112" width="23" height="80" rx="5.5" fill="url(#bar)" opacity="0.68"/>
  <rect x="89" y="112" width="5"  height="80" rx="2.5" fill="#5AB0FF" opacity="0.22"/>
  <rect x="107" y="112" width="2" height="80" rx="1"   fill="#1B2B65" opacity="0.06"/>

  <!-- Bar 3 (tallest, primary color) -->
  <rect x="120" y="70" width="23" height="122" rx="5.5" fill="#1B2B65"/>
  <rect x="120" y="70" width="5"  height="122" rx="2.5" fill="#2A3F8F" opacity="0.2"/>
  <rect x="138" y="70" width="2"  height="122" rx="1"   fill="#0F1A3E" opacity="0.1"/>

  <!-- Growth trend curve -->
  <path d="M 50,180 C 64,162 80,134 98,118 C 116,102 134,74 158,56"
        fill="none" stroke="url(#trend)" stroke-width="3.5"
        stroke-linecap="round" filter="url(#trend-glow)"/>

  <!-- Trend arrow tip -->
  <polygon points="158,56 150,62 153,70" fill="#2D7FF9" opacity="0.65"/>

  <!-- AI sparkle: 4-point star (primary) -->
  <path d="M 172,42 L 169,54 L 158,57.5 L 169,61 L 172,73
           L 175,61 L 186,57.5 L 175,54 Z"
        fill="url(#star-g)" filter="url(#star-glow)"/>
  <circle cx="172" cy="57.5" r="2.2" fill="#FFF" opacity="0.5"/>

  <!-- Micro sparkle -->
  <path d="M 190,78 L 189,82.5 L 184.5,84 L 189,85.5 L 190,90
           L 191,85.5 L 195.5,84 L 191,82.5 Z"
        fill="#2D7FF9" opacity="0.35"/>

  <!-- Tiny dot sparkle -->
  <circle cx="182" cy="34" r="1.4" fill="#5AB0FF" opacity="0.25"/>

</svg>

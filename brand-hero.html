<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CrafterIQ Brand Hero</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0D1226; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .logo-mark {
    width: 180px; height: 180px;
    margin-bottom: 48px;
    filter: drop-shadow(0 0 60px rgba(45,127,249,0.3));
    animation: floatIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .wordmark {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 80px; font-weight: 500; letter-spacing: -3px;
    color: #fff; text-align: center;
    animation: fadeUp 1.2s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }
  .wordmark span { font-weight: 700; color: #2D7FF9; }
  .tagline {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 16px; font-weight: 400;
    letter-spacing: 6px; text-transform: uppercase;
    color: #94A3B8; margin-top: 20px;
    animation: fadeUp 1.2s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .export-hint {
    position: fixed; bottom: 20px; right: 24px;
    font-family: 'Inter', sans-serif; font-size: 11px;
    color: rgba(148,163,184,0.4); letter-spacing: 1px;
    z-index: 20; pointer-events: none;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="bg"></canvas>

<div class="overlay">
  <svg class="logo-mark" viewBox="0 0 240 240">
    <defs>
      <linearGradient id="ciq-g" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#2068E0"/>
        <stop offset="40%" stop-color="#2D7FF9"/>
        <stop offset="100%" stop-color="#5AB0FF"/>
      </linearGradient>
    </defs>
    <path d="M 152,28 L 70,28 Q 26,28 26,72 L 26,168 Q 26,212 70,212 L 152,212"
          fill="none" stroke="#FFFFFF" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 54,212 L 36,238 L 80,212" fill="#FFFFFF"/>
    <rect x="58" y="154" width="23" height="38" rx="5.5" fill="url(#ciq-g)"/>
    <rect x="89" y="112" width="23" height="80" rx="5.5" fill="url(#ciq-g)" opacity="0.68"/>
    <rect x="120" y="70" width="23" height="122" rx="5.5" fill="#FFFFFF"/>
    <path d="M 50,180 C 64,162 80,134 98,118 C 116,102 134,74 158,56"
          fill="none" stroke="#2D7FF9" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 172,42 L 169,54 L 158,57.5 L 169,61 L 172,73 L 175,61 L 186,57.5 L 175,54 Z" fill="#2D7FF9"/>
  </svg>
  <div class="wordmark">Crafter<span>IQ</span></div>
  <div class="tagline">Intelligence, Crafted.</div>
</div>

<div class="export-hint">1200 &times; 630 &middot; Open at full size to screenshot</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w, h, time = 0;
const particles = [];
const connections = [];
const gridNodes = [];

function resize() {
  const dpr = window.devicePixelRatio || 1;
  w = canvas.width = window.innerWidth * dpr;
  h = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(dpr, dpr);
}

function initParticles() {
  particles.length = 0;
  const count = Math.floor((window.innerWidth * window.innerHeight) / 12000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 2 + 0.5,
      opacity: Math.random() * 0.4 + 0.1,
      phase: Math.random() * Math.PI * 2
    });
  }

  gridNodes.length = 0;
  const cols = 12, rows = 8;
  for (let i = 0; i <= cols; i++) {
    for (let j = 0; j <= rows; j++) {
      gridNodes.push({
        x: (i / cols) * window.innerWidth,
        y: (j / rows) * window.innerHeight,
        baseX: (i / cols) * window.innerWidth,
        baseY: (j / rows) * window.innerHeight
      });
    }
  }
}

function drawBackground() {
  const iw = window.innerWidth, ih = window.innerHeight;
  const grad = ctx.createRadialGradient(iw * 0.5, ih * 0.45, 0, iw * 0.5, ih * 0.45, iw * 0.7);
  grad.addColorStop(0, '#162350');
  grad.addColorStop(0.4, '#1B2B65');
  grad.addColorStop(0.7, '#111D45');
  grad.addColorStop(1, '#0A0F20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, iw, ih);
}

function drawGrid() {
  const iw = window.innerWidth, ih = window.innerHeight;
  ctx.strokeStyle = 'rgba(45, 127, 249, 0.025)';
  ctx.lineWidth = 1;

  for (const node of gridNodes) {
    node.x = node.baseX + Math.sin(time * 0.3 + node.baseY * 0.005) * 3;
    node.y = node.baseY + Math.cos(time * 0.25 + node.baseX * 0.004) * 2;
  }

  const cols = 13, rows = 9;
  for (let i = 0; i < cols; i++) {
    ctx.beginPath();
    for (let j = 0; j < rows; j++) {
      const idx = i * rows + j;
      if (j === 0) ctx.moveTo(gridNodes[idx].x, gridNodes[idx].y);
      else ctx.lineTo(gridNodes[idx].x, gridNodes[idx].y);
    }
    ctx.stroke();
  }
  for (let j = 0; j < rows; j++) {
    ctx.beginPath();
    for (let i = 0; i < cols; i++) {
      const idx = i * rows + j;
      if (i === 0) ctx.moveTo(gridNodes[idx].x, gridNodes[idx].y);
      else ctx.lineTo(gridNodes[idx].x, gridNodes[idx].y);
    }
    ctx.stroke();
  }
}

function drawDataFlows() {
  const iw = window.innerWidth, ih = window.innerHeight;
  const cx = iw * 0.5, cy = ih * 0.42;

  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 + time * 0.15;
    const radius = 200 + Math.sin(time * 0.4 + i) * 40;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius * 0.6;
    const endX = cx + Math.cos(angle + 0.8) * (radius * 0.3);
    const endY = cy + Math.sin(angle + 0.8) * (radius * 0.3) * 0.6;

    const grad = ctx.createLinearGradient(x, y, endX, endY);
    grad.addColorStop(0, 'rgba(45, 127, 249, 0)');
    grad.addColorStop(0.5, `rgba(45, 127, 249, ${0.06 + Math.sin(time + i) * 0.03})`);
    grad.addColorStop(1, 'rgba(45, 127, 249, 0)');

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(
      cx + Math.cos(angle + 0.4) * radius * 0.7,
      cy + Math.sin(angle + 0.4) * radius * 0.4,
      endX, endY
    );
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawParticles() {
  const iw = window.innerWidth, ih = window.innerHeight;
  const cx = iw * 0.5, cy = ih * 0.42;

  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = iw;
    if (p.x > iw) p.x = 0;
    if (p.y < 0) p.y = ih;
    if (p.y > ih) p.y = 0;

    const dx = p.x - cx, dy = p.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const proximity = Math.max(0, 1 - dist / 400);
    const glow = p.opacity + proximity * 0.3;
    const pulse = Math.sin(time * 1.5 + p.phase) * 0.15 + 0.85;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = proximity > 0.2
      ? `rgba(45, 127, 249, ${glow * pulse})`
      : `rgba(148, 163, 184, ${p.opacity * 0.5 * pulse})`;
    ctx.fill();
  }

  const maxDist = 120;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.06;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(45, 127, 249, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function drawVignette() {
  const iw = window.innerWidth, ih = window.innerHeight;
  const grad = ctx.createRadialGradient(iw * 0.5, ih * 0.5, iw * 0.25, iw * 0.5, ih * 0.5, iw * 0.8);
  grad.addColorStop(0, 'rgba(10, 15, 32, 0)');
  grad.addColorStop(1, 'rgba(10, 15, 32, 0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, iw, ih);
}

function drawAmbientGlow() {
  const iw = window.innerWidth, ih = window.innerHeight;
  const cx = iw * 0.5, cy = ih * 0.38;

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 300);
  grad.addColorStop(0, 'rgba(45, 127, 249, 0.06)');
  grad.addColorStop(0.5, 'rgba(27, 43, 101, 0.03)');
  grad.addColorStop(1, 'rgba(45, 127, 249, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, iw, ih);

  const pulse = Math.sin(time * 0.5) * 0.02 + 0.04;
  const grad2 = ctx.createRadialGradient(cx, cy - 20, 0, cx, cy - 20, 180);
  grad2.addColorStop(0, `rgba(45, 127, 249, ${pulse})`);
  grad2.addColorStop(1, 'rgba(45, 127, 249, 0)');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, iw, ih);
}

function animate() {
  const iw = window.innerWidth, ih = window.innerHeight;
  time += 0.016;
  ctx.clearRect(0, 0, iw, ih);
  drawBackground();
  drawGrid();
  drawDataFlows();
  drawParticles();
  drawAmbientGlow();
  drawVignette();
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => { resize(); initParticles(); });
resize();
initParticles();
animate();
</script>
</body>
</html>
